<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b23"/>
      <stop offset="100%" stop-color="#0f0f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle gradient glow -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Terminal window mock -->
  <g transform="translate(680, 180)">
    <rect x="0" y="0" width="420" height="280" rx="12" fill="#0d0d12" stroke="rgba(139, 92, 246, 0.2)" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="420" height="36" rx="12" fill="#1a1b23"/>
    <rect x="0" y="24" width="420" height="12" fill="#1a1b23"/>

    <!-- Window buttons -->
    <circle cx="20" cy="18" r="6" fill="#ef4444"/>
    <circle cx="42" cy="18" r="6" fill="#eab308"/>
    <circle cx="64" cy="18" r="6" fill="#22c55e"/>

    <!-- Terminal prompt -->
    <text x="20" y="70" font-family="SF Mono, Monaco, monospace" font-size="14" fill="#8b5cf6">$</text>
    <text x="36" y="70" font-family="SF Mono, Monaco, monospace" font-size="14" fill="#a1a1aa">termicolor --generate</text>

    <!-- Color palette rows -->
    <g transform="translate(20, 95)">
      <!-- Normal colors -->
      <rect x="0" y="0" width="44" height="28" rx="4" fill="#1c1c1c"/>
      <rect x="50" y="0" width="44" height="28" rx="4" fill="#c41a16"/>
      <rect x="100" y="0" width="44" height="28" rx="4" fill="#2ca52c"/>
      <rect x="150" y="0" width="44" height="28" rx="4" fill="#c1c11a"/>
      <rect x="200" y="0" width="44" height="28" rx="4" fill="#5757ff"/>
      <rect x="250" y="0" width="44" height="28" rx="4" fill="#b13fa9"/>
      <rect x="300" y="0" width="44" height="28" rx="4" fill="#00c1c1"/>
      <rect x="350" y="0" width="44" height="28" rx="4" fill="#c7c7c7"/>

      <!-- Bright colors -->
      <rect x="0" y="40" width="44" height="28" rx="4" fill="#686868"/>
      <rect x="50" y="40" width="44" height="28" rx="4" fill="#fd6563"/>
      <rect x="100" y="40" width="44" height="28" rx="4" fill="#68f968"/>
      <rect x="150" y="40" width="44" height="28" rx="4" fill="#fffc65"/>
      <rect x="200" y="40" width="44" height="28" rx="4" fill="#9696ff"/>
      <rect x="250" y="40" width="44" height="28" rx="4" fill="#f966ef"/>
      <rect x="300" y="40" width="44" height="28" rx="4" fill="#68f9f9"/>
      <rect x="350" y="40" width="44" height="28" rx="4" fill="#ffffff"/>
    </g>

    <!-- Output text -->
    <text x="20" y="200" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#22c55e">✓</text>
    <text x="40" y="200" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#a1a1aa">Exported to iTerm2</text>
    <text x="20" y="225" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#22c55e">✓</text>
    <text x="40" y="225" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#a1a1aa">Exported to Alacritty</text>
    <text x="20" y="250" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#22c55e">✓</text>
    <text x="40" y="250" font-family="SF Mono, Monaco, monospace" font-size="13" fill="#a1a1aa">Exported to Kitty</text>
  </g>

  <!-- Logo icon -->
  <g transform="translate(100, 200)">
    <rect width="64" height="64" rx="12" fill="url(#accent)"/>
    <path d="M16 20l10 10-10 10" stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M30 40h18" stroke="#000" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Main text -->
  <text x="100" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Termicolor</text>

  <!-- Tagline -->
  <text x="100" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a1a1aa">Terminal Color Scheme Generator</text>

  <!-- Feature badges -->
  <g transform="translate(100, 410)">
    <rect x="0" y="0" width="90" height="32" rx="6" fill="rgba(139, 92, 246, 0.2)" stroke="rgba(139, 92, 246, 0.3)" stroke-width="1"/>
    <text x="45" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle">iTerm2</text>

    <rect x="100" y="0" width="90" height="32" rx="6" fill="rgba(139, 92, 246, 0.2)" stroke="rgba(139, 92, 246, 0.3)" stroke-width="1"/>
    <text x="145" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle">Alacritty</text>

    <rect x="200" y="0" width="90" height="32" rx="6" fill="rgba(139, 92, 246, 0.2)" stroke="rgba(139, 92, 246, 0.3)" stroke-width="1"/>
    <text x="245" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle">Kitty</text>

    <rect x="300" y="0" width="140" height="32" rx="6" fill="rgba(139, 92, 246, 0.2)" stroke="rgba(139, 92, 246, 0.3)" stroke-width="1"/>
    <text x="370" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle">Windows Terminal</text>
  </g>

  <!-- URL -->
  <text x="100" y="520" font-family="system-ui, sans-serif" font-size="20" fill="#71717a">termicolor.io</text>
</svg>
